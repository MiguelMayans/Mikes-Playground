  <path d="M 135 125 Q 150 140 145 160" stroke="#228B22" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 75 135 Q 60 155 70 170" stroke="#32CD32" stroke-width="3" fill="none" stroke-linecap="round"/>
