<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="100" rx="8" ry="35" fill="#333333" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="100" cy="65" r="10" fill="#333333" stroke="#000" stroke-width="2"/>
  
  <!-- Antennae -->
  <path d="M 100 55 Q 90 40 85 35" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 55 Q 110 40 115 35" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="85" cy="35" r="4" fill="#FF69B4"/>
  <circle cx="115" cy="35" r="4" fill="#FF69B4"/>
  
  <!-- Top left wing -->
  <ellipse cx="75" cy="85" rx="25" ry="35" fill="#FF1493" stroke="#C71585" stroke-width="2" transform="rotate(-30 75 85)"/>
  <!-- Top left wing spots -->
  <circle cx="70" cy="70" r="5" fill="#FFB6C1"/>
  <circle cx="75" cy="85" r="4" fill="#FFB6C1"/>
  
  <!-- Top right wing -->
  <ellipse cx="125" cy="85" rx="25" ry="35" fill="#00CED1" stroke="#008B8B" stroke-width="2" transform="rotate(30 125 85)"/>
  <!-- Top right wing spots -->
  <circle cx="130" cy="70" r="5" fill="#AFEEEE"/>
  <circle cx="125" cy="85" r="4" fill="#AFEEEE"/>
  
  <!-- Bottom left wing -->
  <ellipse cx="75" cy="115" rx="20" ry="28" fill="#FFB6C1" stroke="#C71585" stroke-width="2" transform="rotate(-40 75 115)"/>
  
  <!-- Bottom right wing -->
  <ellipse cx="125" cy="115" rx="20" ry="28" fill="#87CEEB" stroke="#008B8B" stroke-width="2" transform="rotate(40 125 115)"/>
</svg>