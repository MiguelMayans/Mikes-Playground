  <line x1="73" y1="150" x2="127" y2="150" stroke="#8B7355" stroke-width="1"/>
  <line x1="71" y1="160" x2="129" y2="160" stroke="#8B7355" stroke-width="1"/>
  <line x1="72" y1="170" x2="128" y2="170" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Ice cream scoop bottom -->
  <circle cx="100" cy="110" r="35" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
  
