<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Window frame -->
  <rect x="40" y="40" width="120" height="120" fill="#8B4513" stroke="#654321" stroke-width="3" rx="5"/>
  
  <!-- Pane 1 (top-left) -->
  <rect x="45" y="45" width="55" height="55" fill="#87CEEB" stroke="#1E90FF" stroke-width="2"/>
  
  <!-- Pane 2 (top-right) -->
  <rect x="103" y="45" width="55" height="55" fill="#87CEEB" stroke="#1E90FF" stroke-width="2"/>
  
  <!-- Pane 3 (bottom-left) -->
  <rect x="45" y="103" width="55" height="55" fill="#87CEEB" stroke="#1E90FF" stroke-width="2"/>
  
  <!-- Pane 4 (bottom-right) -->
  <rect x="103" y="103" width="55" height="55" fill="#87CEEB" stroke="#1E90FF" stroke-width="2"/>
  
  <!-- Cross bars -->
  <line x1="100" y1="45" x2="100" y2="158" stroke="#654321" stroke-width="2"/>
  <line x1="45" y1="100" x2="158" y2="100" stroke="#654321" stroke-width="2"/>
  
  <!-- Shine effect -->
  <ellipse cx="65" cy="60" rx="12" ry="15" fill="#FFFFFF" opacity="0.4"/>
  <ellipse cx="123" cy="120" rx="12" ry="15" fill="#E0FFFF" opacity="0.3"/>
</svg>